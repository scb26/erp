<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Unidex ERP database diagram</title>
  <desc id="desc">Visual map of the full Unidex ERP MySQL schema and the current simplified customer backend table.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111d"/>
      <stop offset="100%" stop-color="#0e1f31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e2236"/>
      <stop offset="100%" stop-color="#132b42"/>
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3fb7ff"/>
      <stop offset="100%" stop-color="#7ed7ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78d3ff"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(7, 17, 29, 0.52); stroke: rgba(126, 215, 255, 0.18); stroke-width: 1.5; }
      .card { fill: url(#panel); stroke: rgba(126, 215, 255, 0.30); stroke-width: 1.5; rx: 22; }
      .card-header { fill: rgba(63, 183, 255, 0.14); }
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 16px Inter, Arial, sans-serif; fill: #b8d7eb; }
      .card-title { font: 700 19px Inter, Arial, sans-serif; fill: #ffffff; }
      .field { font: 500 14px 'Consolas', 'Courier New', monospace; fill: #d8ecfb; }
      .muted { fill: #9fc2d8; }
      .note-title { font: 700 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .note { font: 500 15px Inter, Arial, sans-serif; fill: #d8ecfb; }
      .relation { stroke: #78d3ff; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .relation-dashed { stroke: #78d3ff; stroke-opacity: 0.8; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .chip { fill: rgba(63, 183, 255, 0.16); stroke: rgba(126, 215, 255, 0.24); }
      .chip-text { font: 600 13px Inter, Arial, sans-serif; fill: #cfeefe; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1120"/>
  <rect class="panel" x="24" y="24" width="1752" height="1072" rx="28"/>

  <text class="title" x="60" y="84">Unidex Database Overview</text>
  <text class="subtitle" x="60" y="114">Left: full ERP MySQL schema planned for scale. Right: current live backend customer module.</text>

  <rect class="chip" x="60" y="136" width="220" height="32" rx="16"/>
  <text class="chip-text" x="82" y="157">FULL ERP RELATIONAL MODEL</text>
  <rect class="chip" x="1260" y="136" width="212" height="32" rx="16"/>
  <text class="chip-text" x="1282" y="157">CURRENT LIVE BACKEND</text>

  <!-- roles -->
  <g transform="translate(70 200)">
    <rect class="card" width="240" height="140" rx="20"/>
    <rect class="card-header" width="240" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">roles</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">code UNIQUE</text>
    <text class="field" x="18" y="110">name</text>
    <text class="field muted" x="18" y="132">created_at</text>
  </g>

  <!-- users -->
  <g transform="translate(370 180)">
    <rect class="card" width="280" height="190" rx="20"/>
    <rect class="card-header" width="280" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">users</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">role_id FK -&gt; roles.id</text>
    <text class="field" x="18" y="110">full_name</text>
    <text class="field" x="18" y="132">email UNIQUE</text>
    <text class="field" x="18" y="154">password_hash</text>
    <text class="field muted" x="18" y="176">is_active, created_at, updated_at</text>
  </g>

  <!-- companies -->
  <g transform="translate(730 170)">
    <rect class="card" width="340" height="230" rx="20"/>
    <rect class="card-header" width="340" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">companies</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">owner_user_id FK -&gt; users.id</text>
    <text class="field" x="18" y="110">company_name</text>
    <text class="field" x="18" y="132">legal_name</text>
    <text class="field" x="18" y="154">gstin UNIQUE</text>
    <text class="field" x="18" y="176">state_name</text>
    <text class="field" x="18" y="198">phone, email</text>
    <text class="field muted" x="18" y="220">address, city, postal_code, country_name</text>
  </g>

  <!-- customers -->
  <g transform="translate(520 470)">
    <rect class="card" width="320" height="230" rx="20"/>
    <rect class="card-header" width="320" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">customers</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">company_id FK -&gt; companies.id</text>
    <text class="field" x="18" y="110">customer_code</text>
    <text class="field" x="18" y="132">customer_name</text>
    <text class="field" x="18" y="154">gstin</text>
    <text class="field" x="18" y="176">state_name</text>
    <text class="field" x="18" y="198">email, phone</text>
    <text class="field muted" x="18" y="220">address, city, postal_code, is_active</text>
  </g>

  <!-- products -->
  <g transform="translate(900 470)">
    <rect class="card" width="330" height="230" rx="20"/>
    <rect class="card-header" width="330" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">products</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">company_id FK -&gt; companies.id</text>
    <text class="field" x="18" y="110">product_code</text>
    <text class="field" x="18" y="132">product_name</text>
    <text class="field" x="18" y="154">product_type, hsn_sac_code</text>
    <text class="field" x="18" y="176">default_rate, gst_rate</text>
    <text class="field" x="18" y="198">unit_name</text>
    <text class="field muted" x="18" y="220">is_active, created_at, updated_at</text>
  </g>

  <!-- invoices -->
  <g transform="translate(640 770)">
    <rect class="card" width="470" height="240" rx="20"/>
    <rect class="card-header" width="470" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">invoices</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">company_id FK -&gt; companies.id</text>
    <text class="field" x="18" y="110">customer_id FK -&gt; customers.id</text>
    <text class="field" x="18" y="132">created_by_user_id FK -&gt; users.id</text>
    <text class="field" x="18" y="154">invoice_number, invoice_date</text>
    <text class="field" x="18" y="176">place_of_supply_state, supply_type</text>
    <text class="field" x="18" y="198">subtotal_amount, cgst_amount, sgst_amount, igst_amount</text>
    <text class="field muted" x="18" y="220">grand_total_amount, status, notes, timestamps</text>
  </g>

  <!-- invoice_items -->
  <g transform="translate(1160 790)">
    <rect class="card" width="350" height="210" rx="20"/>
    <rect class="card-header" width="350" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">invoice_items</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">invoice_id FK -&gt; invoices.id</text>
    <text class="field" x="18" y="110">product_id FK -&gt; products.id</text>
    <text class="field" x="18" y="132">line_number, item_name</text>
    <text class="field" x="18" y="154">quantity, unit_rate, gst_rate</text>
    <text class="field muted" x="18" y="176">taxable_value, line_total_amount</text>
  </g>

  <!-- payments -->
  <g transform="translate(1340 520)">
    <rect class="card" width="260" height="190" rx="20"/>
    <rect class="card-header" width="260" height="42" rx="20"/>
    <text class="card-title" x="18" y="28">payments</text>
    <text class="field" x="18" y="66">id PK</text>
    <text class="field" x="18" y="88">invoice_id FK -&gt; invoices.id</text>
    <text class="field" x="18" y="110">payment_date</text>
    <text class="field" x="18" y="132">amount, payment_mode</text>
    <text class="field muted" x="18" y="154">reference_number, notes</text>
  </g>

  <!-- current backend customer table -->
  <g transform="translate(1260 210)">
    <rect class="card" width="470" height="250" rx="22"/>
    <rect class="card-header" width="470" height="42" rx="22"/>
    <text class="card-title" x="18" y="28">backend/sql/customers.sql</text>
    <text class="field" x="18" y="66">customers</text>
    <text class="field" x="18" y="94">id PK</text>
    <text class="field" x="18" y="118">name, mobile UNIQUE</text>
    <text class="field" x="18" y="142">customer_type, company_name</text>
    <text class="field" x="18" y="166">gst_number, opening_balance, credit_limit</text>
    <text class="field" x="18" y="190">email, city, state, pincode</text>
    <text class="field muted" x="18" y="214">address, created_at</text>
    <text class="note" x="18" y="238">This is live for the customer API, but it is still a simplified table</text>
  </g>

  <!-- notes -->
  <g transform="translate(70 860)">
    <rect class="card" width="500" height="180" rx="22"/>
    <rect class="card-header" width="500" height="42" rx="22"/>
    <text class="note-title" x="18" y="28">What this means</text>
    <text class="note" x="18" y="68">1. companies is the seller/master business profile.</text>
    <text class="note" x="18" y="96">2. customers and products belong to one company.</text>
    <text class="note" x="18" y="124">3. invoices is the main sales header table.</text>
    <text class="note" x="18" y="152">4. invoice_items stores every line inside one invoice.</text>
    <text class="note" x="18" y="180">5. payments is optional and tracks money received later.</text>
  </g>

  <g transform="translate(1260 760)">
    <rect class="card" width="470" height="180" rx="22"/>
    <rect class="card-header" width="470" height="42" rx="22"/>
    <text class="note-title" x="18" y="28">GST logic in schema</text>
    <text class="note" x="18" y="68">company.state_name + customer.state_name</text>
    <text class="note" x="18" y="96">determines invoices.supply_type</text>
    <text class="note" x="18" y="124">Then invoice header stores CGST / SGST / IGST totals.</text>
    <text class="note" x="18" y="152">Each invoice line separately stores gst_rate used at billing time.</text>
  </g>

  <!-- relations -->
  <path class="relation" d="M 310 270 C 340 270, 340 275, 370 275"/>
  <path class="relation" d="M 650 275 C 690 275, 690 285, 730 285"/>
  <path class="relation" d="M 900 400 C 900 435, 680 435, 680 470"/>
  <path class="relation" d="M 980 400 C 980 435, 1065 435, 1065 470"/>
  <path class="relation" d="M 865 400 C 865 570, 780 570, 780 770"/>
  <path class="relation" d="M 650 680 C 650 730, 760 730, 760 770"/>
  <path class="relation-dashed" d="M 510 370 C 510 610, 700 610, 700 770"/>
  <path class="relation" d="M 1110 890 C 1132 890, 1138 890, 1160 890"/>
  <path class="relation-dashed" d="M 1110 840 C 1225 840, 1225 620, 1340 620"/>
  <path class="relation" d="M 1230 585 C 1265 585, 1265 890, 1160 890"/>

  <!-- legend -->
  <g transform="translate(1460 74)">
    <line class="relation" x1="0" y1="0" x2="46" y2="0"/>
    <text class="subtitle" x="58" y="5">required FK relation</text>
    <line class="relation-dashed" x1="0" y1="26" x2="46" y2="26"/>
    <text class="subtitle" x="58" y="31">optional FK relation</text>
  </g>
</svg>
